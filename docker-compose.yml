services:
  knosi:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - knosi-data:/app/data
    environment:
      # Database — local SQLite (default, no config needed)
      # For Turso, set: TURSO_DATABASE_URL=libsql://your-db.turso.io
      #                  TURSO_AUTH_TOKEN=your-token
      TURSO_DATABASE_URL: "file:data/second-brain.db"

      # Auth — generate with: openssl rand -base64 32
      AUTH_SECRET: "${AUTH_SECRET:-please-change-this-secret}"

      # OAuth (optional — without these, only email/password login works)
      AUTH_GITHUB_ID: "${AUTH_GITHUB_ID:-}"
      AUTH_GITHUB_SECRET: "${AUTH_GITHUB_SECRET:-}"
      AUTH_GOOGLE_ID: "${AUTH_GOOGLE_ID:-}"
      AUTH_GOOGLE_SECRET: "${AUTH_GOOGLE_SECRET:-}"

      # AI provider (optional, defaults to codex)
      AI_PROVIDER: "${AI_PROVIDER:-codex}"
      AI_DAILY_LIMIT: "${AI_DAILY_LIMIT:-50}"

      # Feature flags — set to true to enable
      ENABLE_TOKEN_USAGE: "${ENABLE_TOKEN_USAGE:-false}"
      NEXT_PUBLIC_ENABLE_TOKEN_USAGE: "${NEXT_PUBLIC_ENABLE_TOKEN_USAGE:-false}"
      ENABLE_PORTFOLIO: "${ENABLE_PORTFOLIO:-false}"
      NEXT_PUBLIC_ENABLE_PORTFOLIO: "${NEXT_PUBLIC_ENABLE_PORTFOLIO:-false}"
      ENABLE_OSS_PROJECTS: "${ENABLE_OSS_PROJECTS:-false}"
      NEXT_PUBLIC_ENABLE_OSS_PROJECTS: "${NEXT_PUBLIC_ENABLE_OSS_PROJECTS:-false}"
      ENABLE_FOCUS_TRACKER: "${ENABLE_FOCUS_TRACKER:-false}"
      NEXT_PUBLIC_ENABLE_FOCUS_TRACKER: "${NEXT_PUBLIC_ENABLE_FOCUS_TRACKER:-false}"
    restart: unless-stopped

volumes:
  knosi-data:
