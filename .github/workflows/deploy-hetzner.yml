name: Deploy To Hetzner

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hetzner-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      DEPLOY_HOST: ${{ secrets.HETZNER_HOST }}
      DEPLOY_PATH: /srv/knosi
      DEPLOY_PORT: ${{ secrets.HETZNER_SSH_PORT || '22' }}
      DEPLOY_USER: ${{ secrets.HETZNER_USER }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.9.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Validate deployment files
        run: |
          test -f ops/hetzner/Caddyfile
          test -f ops/hetzner/deploy.sh
          test -f ops/hetzner/rsync-excludes.txt
          test -f ops/k3s/20-knosi.yaml

      - name: Configure SSH
        env:
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$HETZNER_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Ensure remote path exists
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"

      - name: Sync repository to Hetzner
        run: |
          rsync -az --delete \
            --exclude-from=ops/hetzner/rsync-excludes.txt \
            -e "ssh -p $DEPLOY_PORT" \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Deploy on Hetzner
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "APP_DIR='$DEPLOY_PATH' NEXT_DEPLOYMENT_ID='${{ github.sha }}' GIT_SHA='${{ github.sha }}' DEPLOYED_AT='$(date -u +"%Y-%m-%dT%H:%M:%SZ")' '$DEPLOY_PATH/ops/hetzner/deploy.sh'"
