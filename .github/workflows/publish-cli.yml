name: Publish @knosi/cli

on:
  push:
    branches:
      - main
    paths:
      - "packages/cli/**"
  workflow_dispatch:

concurrency:
  group: publish-cli
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Run CLI unit tests
        working-directory: packages/cli
        run: |
          node --test src/commands/auth-login.test.mjs \
                      src/commands/save-ai-note.test.mjs \
                      src/daily-ping-scheduler.test.mjs \
                      src/daemon-notifications.test.mjs

      - name: Compare local version against npm registry
        id: version
        working-directory: packages/cli
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view @knosi/cli version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL"   >> "$GITHUB_OUTPUT"
          echo "remote=$REMOTE" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Local $LOCAL matches registry $REMOTE — nothing to publish."
          else
            # Use sort -V to confirm LOCAL is strictly greater than REMOTE.
            HIGHEST=$(printf '%s\n%s\n' "$LOCAL" "$REMOTE" | sort -V | tail -n1)
            if [ "$HIGHEST" = "$LOCAL" ]; then
              echo "should_publish=true" >> "$GITHUB_OUTPUT"
              echo "Local $LOCAL > registry $REMOTE — will publish."
            else
              echo "should_publish=false" >> "$GITHUB_OUTPUT"
              echo "::error::Local version $LOCAL is lower than registry $REMOTE. Bump package.json version before merging."
              exit 1
            fi
          fi

      - name: Check NPM_TOKEN secret is configured
        id: token-check
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            echo "has_token=true"  >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "::warning::NPM_TOKEN secret is not configured. Create an npm automation token (npmjs.com → Access Tokens → Automation) and add it to the repo secrets as NPM_TOKEN. The publish step will be skipped for this run."
          fi

      - name: Publish to npm
        if: steps.version.outputs.should_publish == 'true' && steps.token-check.outputs.has_token == 'true'
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Summary
        if: always()
        run: |
          echo "## @knosi/cli publish summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- local version:  ${{ steps.version.outputs.local }}"   >> "$GITHUB_STEP_SUMMARY"
          echo "- registry version: ${{ steps.version.outputs.remote }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- version needs publish: ${{ steps.version.outputs.should_publish }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- NPM_TOKEN configured: ${{ steps.token-check.outputs.has_token }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.version.outputs.should_publish }}" = "true" ] && [ "${{ steps.token-check.outputs.has_token }}" = "true" ]; then
            echo "- result: **published ${{ steps.version.outputs.local }} to npm**" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.version.outputs.should_publish }}" = "true" ] && [ "${{ steps.token-check.outputs.has_token }}" = "false" ]; then
            echo "- result: **skipped — NPM_TOKEN secret missing**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- result: nothing to publish" >> "$GITHUB_STEP_SUMMARY"
          fi
