services:
  knosi:
    build:
      context: .
      args:
        NEXT_DEPLOYMENT_ID: ${NEXT_DEPLOYMENT_ID:-local}
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_DEPLOYMENT_ID: ${NEXT_DEPLOYMENT_ID:-local}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    ports:
      - "127.0.0.1:3000:3000"
    expose:
      - "3000"
    depends_on:
      - redis
    volumes:
      - knosi-data:/app/data
      - ./runtime:/app/runtime:ro

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
    volumes:
      - redis-data:/data

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - knosi
    env_file:
      - .env.production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/hetzner/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  knosi-data:
  redis-data:
  caddy-data:
  caddy-config:
