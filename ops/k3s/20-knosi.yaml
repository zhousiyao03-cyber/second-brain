---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: knosi
  namespace: knosi
  labels:
    app: knosi
spec:
  replicas: 1
  # Production runs against remote Turso (TURSO_DATABASE_URL is set in
  # knosi-env), so the container is stateless and can roll without a PVC.
  # maxUnavailable=0 keeps at least one pod serving traffic at all times,
  # eliminating the deploy-time downtime window we used to get with the old
  # Recreate strategy + RWO local-path PVC combo.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: knosi
  template:
    metadata:
      labels:
        app: knosi
    spec:
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "waiting for redis..."
              until nc -z redis.knosi.svc.cluster.local 6379; do
                sleep 2
              done
              echo "redis ready"
      containers:
        - name: knosi
          image: docker.io/library/knosi:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: knosi-env
          env:
            - name: NODE_ENV
              value: production
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: PORT
              value: "3000"
            - name: REDIS_URL
              value: "redis://redis.knosi.svc.cluster.local:6379"
            # Turso is in aws-us-east-1; round-trip from Hetzner (nbg1) is
            # ~100ms so indexed point-lookups routinely trip the 100ms default.
            # Raise to 300ms so the slow-query log flags real regressions, not
            # the geo-latency floor. Lower this again if we move to embedded
            # replicas or an eu-west Turso region.
            - name: SLOW_QUERY_MS
              value: "300"
          startupProbe:
            httpGet:
              path: /login
              port: 3000
            failureThreshold: 30
            periodSeconds: 5
            # Cold-start /login can hit a 300-500ms Turso lookup; the default
            # 1s probe timeout was too tight and tripped during rollouts.
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /login
              port: 3000
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /login
              port: 3000
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: knosi
  namespace: knosi
spec:
  selector:
    app: knosi
  ports:
    - port: 3000
      targetPort: 3000
